services:
  postgres:
    image: postgres:17-alpine
    container_name: axis_db
    restart: always
    environment:
      POSTGRES_USER: axis_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: axis_db
    ports:
      - "5432:5432"
    volumes:
      - axis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U axis_user -d axis_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  axis_pgdata: